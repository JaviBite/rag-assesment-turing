services:
  # 1) Base de datos vectorial (modo servidor HTTP).
  chroma:
    image: chromadb/chroma:0.5.23
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8001:8000"   # opcional, para inspección desde el host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 2) Servicio local de detección de objetos (Apartado 3).
  detector:
    build: ./detector
    environment:
      - YOLO_MODEL=yolov8n.pt
      - YOLO_CONF=0.25
    ports:
      - "8002:8000"   # accesible desde Postman/Python en el host
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 3) App: Chainlit (UI) + LangGraph (backend) + embeddings CPU + CLI de ingesta.
  #    El LLM (Gemma, multimodal + tool-calling) lo sirve Ollama NATIVO en el
  #    host (Metal/GPU de Apple Silicon), no un contenedor: mucho más rápido
  #    para describir imágenes que el Ollama dockerizado en CPU.
  #    Antes de levantar: `ollama serve` (o abre la app Ollama) y
  #    `ollama pull ${OLLAMA_MODEL:-gemma3:4b}`.
  app:
    build: ./app
    environment:
      - VLLM_BASE_URL=http://host.docker.internal:11434/v1
      - VLLM_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - DETECTOR_URL=http://detector:8000
      - EMBEDDING_MODEL=BAAI/bge-m3
      - SUMMARY_TOKEN_THRESHOLD=3000
      - DOCS_DIR=/docs
      - DATA_DIR=/data
    volumes:
      - ./docs:/docs
      - ./data:/data
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8501:8501"   # Chainlit
    depends_on:
      chroma:
        condition: service_healthy
      detector:
        condition: service_healthy

volumes:
  chroma-data:
  hf-cache:
